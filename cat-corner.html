<!DOCTYPE html>
<html>

<head>
	<link rel="stylesheet" href="styles.css">

<title>
	Jackie's Website

<body>
<div class="topnav"> 
  <a href="#">About Me</a>
  <a href="#">CV</a>
  <a href="#">Fluid Demos</a>
  <a href="#">Miscellanious Facts</a>
  <a href="#">Cat Corner</a>
</div>

<div class="content">
  <h2> An Array of Cat Photos</h2>
  <button id="cat-button" onclick="generateCats()"> Generate Cats </button>
  <div class="image-grid" id="catgrid"> </div>

<div class="footer">
  <p>Footer</p>
</div>

<script>

let cat_urls = [];
async function loadCats() {
  response = await fetch("./cat_urls.json");
  cat_urls = await response.json();
}

  
async function generateCats() {
   catgrid = document.getElementById("catgrid");
   console.log(catgrid.childElementCount);
   if (catgrid.childElementCount < 1) {
      await loadCats();
      console.log(cat_urls[0]);
      for (i=0; i<3; i++) {
         for (j=0; j<2; j++) {
          /*   const newElement = document.createElement("image-item"); */
             const newElement = new Image();
             newElement.className = "image-item";
             newElement.id = `cat ${i}, ${j}`;
             newElement.innerHTML = newElement.id;
             await catgrid.appendChild(newElement);
             console.log(newElement.className);
          }
      }     
  } 
  for (i=0; i<3; i++) {
    for (j=0; j<2; j++) {
      cat_tile = document.getElementById(`cat ${i}, ${j}`);
      index =  Math.floor(Math.random()*cat_urls.length);
      cat_tile.src = cat_urls[index];
    }
  } 

}
          
       
  

</script>
</html>
